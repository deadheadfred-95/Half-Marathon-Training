<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sub-2 Half Marathon Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .progress-card { transition: all 0.3s ease; }
        .completed-card { 
            background-color: #f8fafc; 
            border-color: #cbd5e1; 
            opacity: 0.8;
        }
        .completed-text { text-decoration: line-through; color: #94a3b8; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans pb-16">

    <header class="bg-slate-900 text-white p-6 shadow-md sticky top-0 z-20">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold italic tracking-tight text-blue-400">SUB-2:00 TRACKER</h1>
                <p class="text-slate-400 text-sm mt-1">Target Race: December 4</p>
            </div>
            <div class="text-right">
                <p class="text-xs uppercase tracking-widest text-slate-400 mb-1">Paces</p>
                <div class="flex gap-3 text-sm font-mono">
                    <span class="bg-slate-800 px-2 py-1 rounded">Easy: 10:49</span>
                    <span class="bg-blue-900 px-2 py-1 rounded text-blue-100">Tempo: 8:44</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-8">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8 sticky top-[100px] z-10">
            <div class="flex justify-between items-end mb-2">
                <h2 class="text-lg font-bold text-slate-800">Training Progress</h2>
                <span class="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full" id="progress-text">0%</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-4 overflow-hidden border border-slate-200">
                <div id="progress-bar" class="bg-blue-500 h-4 rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
            </div>
            <p id="phases-count" class="text-xs text-slate-500 mt-2 text-right">0 / 10 Phases Complete</p>
        </div>

        <section id="plan-container" class="space-y-4">
            </section>
    </main>

    <script>
        const extendedPlan = [
            { id: 0, date: "May - July", title: "The Summer Base Build", goal: "Gradually add 1-2 miles per week. Focus on consistent, easy running at 10:49 pace.", type: "base build", color: "text-emerald-600" },
            { id: 1, date: "August", title: "Base Maintenance", goal: "Comfortably hit and maintain the 20 miles/week prerequisite required by the plan.", type: "base build", color: "text-emerald-600" },
            { id: 2, date: "Aug 28 - Sep 24", title: "4-Week Targeted Ramp-Up", goal: "Bridge phase: Transition to structured Sunday long runs to prepare for the Day 7 8-mile requirement.", type: "ramp-up", color: "text-blue-600" },
            { id: 3, date: "Sep 25", title: "Official Week 1", goal: "Plan kicks off! Intro to Intervals: 8x400 at 2:00 pace with 200m recovery. First 8 Mile LSD.", type: "official plan", color: "text-purple-600" },
            { id: 4, date: "Oct 9", title: "Official Week 3", goal: "Introduction to Yasso 800s (3x800 at 4:00 pace). Sunday Long Run increases to 10 Miles.", type: "official plan", color: "text-purple-600" },
            { id: 5, date: "Oct 23", title: "Official Week 5", goal: "Halfway point. 'The Mile Buildup' Interval workout. Long run peaks at 12 Miles LSD.", type: "official plan", color: "text-purple-600" },
            { id: 6, date: "Nov 6", title: "Official Week 7", goal: "Peak Volume Week: Prepare for the longest run of the plan—the 14 Mile LSD.", type: "official plan", color: "text-purple-600" },
            { id: 7, date: "Nov 13", title: "Official Week 8", goal: "Final high-intensity week. 10x400 intervals. Sunday: 10 Miles with 6 Miles at 8:44 Tempo pace.", type: "official plan", color: "text-purple-600" },
            { id: 8, date: "Nov 20", title: "Official Week 9 (Taper)", goal: "The Taper begins. 'Mile Breakdown' workout. Long run drops to 8 Miles. Focus on recovery.", type: "taper", color: "text-orange-500" },
            { id: 9, date: "Dec 4", title: "RACE DAY: Sub-2:00 Attempt", goal: "Trust your training. Hold back for the first mile, settle into goal pace, and finish strong!", type: "race day", color: "text-red-600" }
        ];

        // Load saved progress from local storage, or start empty
        let savedProgress = JSON.parse(localStorage.getItem('sub2tracker')) || [];

        const container = document.getElementById('plan-container');

        // Render the UI
        function renderPlan() {
            container.innerHTML = '';
            extendedPlan.forEach((phase) => {
                const isCompleted = savedProgress.includes(phase.id);
                
                const card = document.createElement('div');
                card.className = `progress-card bg-white border-2 rounded-xl p-5 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4 ${isCompleted ? 'completed-card' : 'border-transparent hover:border-blue-200'}`;
                
                card.innerHTML = `
                    <div class="flex-1 w-full">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-bold uppercase tracking-wider ${phase.color}">${phase.type}</span>
                            <span class="text-sm font-semibold bg-slate-100 px-3 py-1 rounded-full text-slate-600">${phase.date}</span>
                        </div>
                        <h3 class="text-lg font-bold text-slate-900 ${isCompleted ? 'completed-text' : ''}">${phase.title}</h3>
                        <p class="text-slate-600 text-sm mt-1 leading-relaxed ${isCompleted ? 'completed-text' : ''}">${phase.goal}</p>
                    </div>
                    <div class="md:ml-4 self-end md:self-center shrink-0">
                        <button 
                            onclick="toggleComplete(${phase.id})" 
                            class="font-bold py-2 px-5 rounded-lg transition-colors w-full md:w-auto ${isCompleted ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200' : 'bg-blue-600 text-white hover:bg-blue-700'}">
                            ${isCompleted ? '✓ Completed' : 'Mark Complete'}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
            updateProgressBar();
        }

        // Handle button clicks
        function toggleComplete(id) {
            if (savedProgress.includes(id)) {
                // Remove it if already completed
                savedProgress = savedProgress.filter(item => item !== id);
            } else {
                // Add it if not completed
                savedProgress.push(id);
            }
            // Save to browser memory
            localStorage.setItem('sub2tracker', JSON.stringify(savedProgress));
            
            // Re-draw everything
            renderPlan();
        }

        // Update the visual progress bar and text
        function updateProgressBar() {
            const total = extendedPlan.length;
            const completed = savedProgress.length;
            const percentage = Math.round((completed / total) * 100);

            document.getElementById('progress-bar').style.width = `${percentage}%`;
            document.getElementById('progress-text').innerText = `${percentage}%`;
            document.getElementById('phases-count').innerText = `${completed} / ${total} Phases Complete`;
            
            // Change color to green when 100% complete
            if(percentage === 100) {
                document.getElementById('progress-bar').classList.replace('bg-blue-500', 'bg-emerald-500');
                document.getElementById('progress-text').classList.replace('text-blue-600', 'text-emerald-600');
                document.getElementById('progress-text').classList.replace('bg-blue-50', 'bg-emerald-50');
            } else {
                document.getElementById('progress-bar').classList.replace('bg-emerald-500', 'bg-blue-500');
                document.getElementById('progress-text').classList.replace('text-emerald-600', 'text-blue-600');
                document.getElementById('progress-text').classList.replace('bg-emerald-50', 'bg-blue-50');
            }
        }

        // Initialize the app on load
        renderPlan();
    </script>
</body>
</html>
